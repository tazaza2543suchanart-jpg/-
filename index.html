<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>เกมแยกหมวดหมู่หนังสือ</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    background-image: url("po1.gif");
    background-size: cover;
    background-position: center;
}

/* กล่องข้อความ */
.container {
    width: 90%;
    max-width: 500px;
    text-align: center;
}

/* ปุ่มคลิก */
.btn {
    width: 100%;
    padding: 30px;
    font-size: 35px;
    border: none;
    border-radius: 20px;
    margin: 50px 0;
    cursor: pointer;
    color: white;
}

.start { background-color: #04AA6D; }
.guide { background-color: #ff0804; }

/* ไอคอนของเพลง */
.music-icon {
    width: 40px;
    position: fixed;
    bottom: 20px;
    right: 20px;
}
</style>

</head>

<body>

<div class="container">

    <a href="start.html">
        <button class="btn start">เริ่มเกม</button>
    </a>

    <a href="Game Recommendation.html">
        <button class="btn guide">แนะนำเกม</button>
    </a>

</div>

<!-- ปุ่มเพลง -->
<img src="mus.png" class="music-icon" onclick="toggleMusic()">

<audio id="music" loop>
    <source src="music1.mp3" type="audio/mpeg">
</audio>

<script>
function toggleMusic(){
    let music = document.getElementById("music");
    if(music.paused){
        music.play();
    }else{
        music.pause();
    }
}
</script>

</body>
</html>
